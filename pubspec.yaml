name: animind
description: 동물 감정 인식 모바일 앱 - Kaggle Pets Facial Expression Dataset 기반
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  tflite_flutter: ^0.12.1
  image_picker: ^1.0.7
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  sqflite: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^12.0.3
  image: ^4.1.7
  path_provider: ^2.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  glados: ^1.1.1
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.3
  plugin_platform_interface: ^2.1.0
  image_picker_platform_interface: ^2.9.0
  permission_handler_platform_interface: ^4.0.0
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/models/
